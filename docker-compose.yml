version: '3.8'

services:
  sunflower-bot:
    build: .
    container_name: sunflower_bot
    restart: unless-stopped
    depends_on:
      - browser
    env_file:
      - .env
    volumes:
      - ./config.json:/app/config.json
      - ./sunflower/hq:/app/sunflower/hq
      - ./sunflower/vault:/app/sunflower/vault

  browser:
    image: browserless/chrome:latest
    container_name: sunflower_browser
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - KEEP_ALIVE=true
      - WORKSPACE_DIR=/app/sunflower/vault
    volumes:
      - ./sunflower/vault/browser:/app/sunflower/vault
